name: Deploy Landing Page

on:
  repository_dispatch:
    types: [deploy-landing]
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: Infinity-light/vibecraft
          token: ${{ secrets.GH_RELEASE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build landing
        run: |
          pnpm install --filter landing --frozen-lockfile
          pnpm --filter landing build

      - name: Prepare deploy bundle
        run: |
          mkdir -p /tmp/landing-bundle
          cp -r apps/landing/dist /tmp/landing-bundle/dist
          cp apps/landing/nginx.conf /tmp/landing-bundle/nginx.conf
          cat > /tmp/landing-bundle/Dockerfile <<'DEOF'
          FROM nginx:alpine
          COPY dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          DEOF
          cat > /tmp/landing-bundle/docker-compose.yml <<'CEOF'
          services:
            vibecraft-landing:
              build: .
              restart: unless-stopped
              ports:
                - "8092:80"
          CEOF
          tar -czf landing-deploy.tar.gz -C /tmp/landing-bundle .

      - name: Copy bundle to Aliyun
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "landing-deploy.tar.gz"
          target: "/tmp/"
          overwrite: true

      - name: Deploy on Aliyun
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_DIR=/opt/apps/vibecraft-landing-deploy
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            tar -xzf /tmp/landing-deploy.tar.gz
            rm -f /tmp/landing-deploy.tar.gz
            echo "=== Building and restarting ==="
            docker compose up -d --build --force-recreate
            docker image prune -f
            echo "=== Landing deployed ==="
