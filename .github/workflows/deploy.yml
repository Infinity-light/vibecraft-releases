name: Deploy to VPS

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy-vibecraft
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: Infinity-light/vibecraft
          token: ${{ secrets.GH_RELEASE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build server and admin
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter server build
          VITE_API_BASE="" pnpm --filter admin build

      - name: Prepare deploy bundle
        run: |
          mkdir -p /tmp/deploy-bundle
          cp docker-compose.prod.yml /tmp/deploy-bundle/
          cp .dockerignore /tmp/deploy-bundle/ 2>/dev/null || true
          mkdir -p /tmp/deploy-bundle/apps/server
          cp apps/server/Dockerfile /tmp/deploy-bundle/apps/server/
          cp apps/server/package.json /tmp/deploy-bundle/apps/server/
          cp -r apps/server/dist /tmp/deploy-bundle/apps/server/
          if [ -d apps/server/migrations ]; then
            cp -r apps/server/migrations /tmp/deploy-bundle/apps/server/
          fi
          mkdir -p /tmp/deploy-bundle/apps/admin
          cp apps/admin/Dockerfile /tmp/deploy-bundle/apps/admin/
          cp apps/admin/nginx.conf /tmp/deploy-bundle/apps/admin/
          cp -r apps/admin/dist /tmp/deploy-bundle/apps/admin/
          mkdir -p /tmp/deploy-bundle/ops/nginx
          cp ops/nginx/vibecraft.conf /tmp/deploy-bundle/ops/nginx/
          tar -czf vibecraft-deploy.tar.gz -C /tmp/deploy-bundle .
          ls -lh vibecraft-deploy.tar.gz

      - name: Copy deploy bundle to Tencent Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "vibecraft-deploy.tar.gz"
          target: "/tmp/"
          overwrite: true

      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 18m
          script: |
            set -e
            mkdir -p /opt/apps/vibecraft
            cd /opt/apps/vibecraft

            echo "=== Extracting deploy bundle ==="
            tar -xzf /tmp/vibecraft-deploy.tar.gz -C /opt/apps/vibecraft
            rm -f /tmp/vibecraft-deploy.tar.gz

            echo "=== Writing .env ==="
            : > .env
            echo "NODE_ENV=production" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "OSS_AccessKey_ID=${{ secrets.OSS_AccessKey_ID }}" >> .env
            echo "OSS_AccessKey_Secret=${{ secrets.OSS_AccessKey_Secret }}" >> .env
            echo "OSS_BUCKET=${{ secrets.OSS_BUCKET }}" >> .env
            echo "OSS_REGION=${{ secrets.OSS_REGION }}" >> .env
            echo "VERSIONS_API_TOKEN=${{ secrets.VERSIONS_API_TOKEN }}" >> .env

            echo "=== Building images ==="
            docker compose -f docker-compose.prod.yml build

            echo "=== Starting containers ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Waiting for postgres ==="
            for i in 1 2 3 4 5 6; do
              if docker exec vibecraft-postgres-1 pg_isready -U vibecraft >/dev/null 2>&1; then
                echo "Postgres ready"
                break
              fi
              echo "Waiting for postgres... ($i/6)"
              sleep 5
            done

            if [ -d apps/server/migrations ]; then
              for sql in $(ls apps/server/migrations/*.sql 2>/dev/null | sort); do
                echo "Applying $sql"
                docker exec -i vibecraft-postgres-1 \
                  psql -U vibecraft -d vibecraft -v ON_ERROR_STOP=1 < "$sql"
              done
              docker restart vibecraft-server-1
            fi

            echo "=== Cleanup ==="
            docker image prune -f

      - name: Reload nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo -n cp /opt/apps/vibecraft/ops/nginx/vibecraft.conf /etc/nginx/sites-available/vibecraft
            sudo -n nginx -t
            sudo -n nginx -s reload

      - name: Health check (boot + 60s stability window)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3m
          script: |
            echo "=== Phase 1: boot check ==="
            sleep 10
            RUNNING=$(docker ps --filter name=vibecraft --format '{{.Names}}' | wc -l)
            echo "Running containers: $RUNNING"
            if [ "$RUNNING" -lt 3 ]; then
              echo "Expected 3 containers, only $RUNNING running"
              docker ps --filter name=vibecraft
              docker logs vibecraft-server-1 --tail 30 2>&1 || true
              exit 1
            fi

            STATUS=""
            for i in 1 2 3 4 5; do
              RESP=$(curl -s http://127.0.0.1:3001/health || true)
              STATUS=$(echo "$RESP" | grep -o '"status":"ok"' || true)
              if [ -n "$STATUS" ]; then
                echo "Boot /health passed: $RESP"
                break
              fi
              echo "Attempt $i: $RESP, retrying..."
              sleep 5
            done
            if [ -z "$STATUS" ]; then
              echo "Boot health check failed — last response: $RESP"
              docker logs vibecraft-server-1 --tail 50 2>&1 || true
              exit 1
            fi

            echo "=== Phase 2: stability observation (60s window) ==="
            sleep 60
            RESTARTS=$(docker inspect vibecraft-server-1 --format '{{.RestartCount}}')
            echo "Server RestartCount after 60s: $RESTARTS"
            if [ "$RESTARTS" -gt 0 ]; then
              echo "FAIL: server crash-looped within stability window (RestartCount=$RESTARTS)"
              docker logs vibecraft-server-1 --tail 80 2>&1 || true
              exit 1
            fi

            FINAL_RESP=$(curl -s http://127.0.0.1:3001/health || true)
            FINAL_STATUS=$(echo "$FINAL_RESP" | grep -o '"status":"ok"' || true)
            if [ -z "$FINAL_STATUS" ]; then
              echo "FAIL: /health degraded after stability window: $FINAL_RESP"
              docker logs vibecraft-server-1 --tail 50 2>&1 || true
              exit 1
            fi
            echo "Stability observation passed: $FINAL_RESP"
